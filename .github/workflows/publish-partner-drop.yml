name: Publish Partner Drop

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Build:
      name: Build Partner Drop
      runs-on: ubuntu-latest
      permissions: 
        actions: read
        contents: read
        deployments: read
        packages: none
      steps:
        
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Get current version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "Version=$VERSION"
          echo "current-version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            dist/
            dist-cjs/
            package.json
            package-lock.json
          retention-days: 1

      outputs:
        current-version: ${{ steps.package_version.outputs.current-version }}

  Publish:
    name: Publish Partner Drop
    runs-on: ubuntu-latest
    needs: Build
    environment: partner-publishing
    permissions: 
        actions: read
        contents: write
        deployments: read
        packages: none
        id-token: write
    env: 
      current-version: ${{ needs.Build.outputs.current-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.1

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts-${{ github.run_id }}
          path: .

      - name: Check version is mentioned in Changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
        with:
            validation_depth: 10
            version: ${{ needs.Build.outputs.current-version }}
            path: 'CHANGELOG.md'

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Create package tarball
        run: npm pack

      - name: Create a Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
            tag_name: ${{ needs.Build.outputs.current-version }}
            name: ${{ needs.Build.outputs.current-version }}
            body: |
              Publish ${{ steps.changelog_reader.outputs.changes }}
            token: ${{ secrets.GITHUB_TOKEN }}

      - name: Federated Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_PARTNER_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_PARTNER_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_PARTNER_SUBSCRIPTION_ID }}

      - name: Upload files to partner drop folder
        run: |
            az account show
            VERSION=${{ env.current-version }}
            BLOBPATH="drops/containerization-assist/js/$VERSION"
            echo "Uploading package version $VERSION to blob path $BLOBPATH"
            az storage blob upload -f "./containerization-assist-mcp-$VERSION.tgz" -c "$BLOBPATH" --account-name azuresdkpartnerdrops --auth-mode login
